<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Walkie Talkie</title>

    <meta name="theme-color" content="#f6a31d">
    <meta name="description" content="Walkie Talkie multiplataforma - comunicacion instantanea">
    <link rel="manifest" href="manifiest.json">
    <link rel="apple-touch-icon" href="iconlogo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="brand-block">
                <div class="brand-mark">
                    <img
                        src="/iconlogo.png"
                        alt="Walkie Talkie Logo"
                        class="brand-logo"
                        onerror="this.style.display='none';this.nextElementSibling.style.display='grid';"
                    >
                    <div class="brand-logo-fallback">WT</div>
                </div>
                <div class="brand-copy">
                    <h1 class="logo">Weasytalkie</h1>
                </div>
            </div>

            <div class="connection-status">
                <span class="status-indicator" id="connectionIndicator"></span>
                <span id="connectionText">Conectando...</span>
            </div>
        </header>

        <div class="auth-panel" id="authPanel">
            <h2>Acceso al canal</h2>
            <p class="subtitle">Ingresa tu usuario y tu clave personal</p>

            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Usuario" maxlength="20" autocomplete="username">
                <input type="password" id="passwordInput" placeholder="Clave" maxlength="80" autocomplete="current-password">
                <button id="connectBtn" class="btn-primary">Entrar</button>
                <button id="registerBtn" class="btn-secondary">Registrarse</button>
            </div>
            <div class="audio-tools">
                <label for="audioProfileSelect">Perfil de audio</label>
                <select id="audioProfileSelect">
                    <option value="stable">Red mala (estable)</option>
                    <option value="balanced" selected>Balanceado</option>
                    <option value="low-latency">Baja latencia</option>
                </select>
            </div>
        </div>

        <div class="main-panel" id="mainPanel" style="display: none;">
            <div class="channel-info panel">
                <div class="channel-selector">
                    <label for="channelSelect">Canal</label>
                    <select id="channelSelect">
                        <option value="general">general</option>
                        <option value="random">random</option>
                        <option value="soporte">soporte</option>
                    </select>
                    <button id="createChannelBtn" class="btn-small" title="Crear canal">+</button>
                </div>

                <div class="user-count">
                    <span id="userCount">0</span> conectados
                </div>
            </div>

            <section class="users-section panel">
                <h3>Usuarios en canal</h3>
                <div class="users-list" id="usersList"></div>
            </section>

            <section class="ptt-section panel">
                <button id="pttButton" class="ptt-button" disabled>
                    <span class="ptt-text">MANTEN PARA HABLAR</span>
                    <span class="ptt-microphone">PTT</span>
                </button>
                <div class="ptt-hint">Mantener presionado para transmitir voz</div>
                <div class="audio-stats" id="audioStats">Perfil: balanceado | RTT: -- | Jitter: -- | Cola: --</div>
            </section>

            <section class="history-section panel">
                <h3>Historial</h3>
                <div class="history-list" id="historyList"></div>
            </section>

            <button id="disconnectBtn" class="btn-secondary">Desconectar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
